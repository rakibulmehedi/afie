name: Bug Report
description: Report a bug in AFIE
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "**Before submitting:** search existing issues to avoid duplicates."
  - type: input
    id: summary
    attributes:
      label: Bug summary
      placeholder: "One sentence describing the bug"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Affected runtime
      options:
        - apps/web (Next.js)
        - apps/ai-worker (Python/FastAPI)
        - Both
        - Unknown
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (include error messages/logs)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, Node version, Docker version"
    validations:
      required: true
