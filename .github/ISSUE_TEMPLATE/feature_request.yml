name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "Describe the problem or limitation you're experiencing"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Describe what you'd like to happen"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Which runtime would this affect?
      options:
        - apps/web (Next.js)
        - apps/ai-worker (Python/FastAPI)
        - Both
        - Neither (docs, config)
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
